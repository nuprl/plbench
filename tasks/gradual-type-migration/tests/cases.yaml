- name: 01-farg-mismatch
  program: >-
    (fun f . f true) (fun x . x + 100)
  oracle_migration: >-
    (fun f:bool -> int. f true) (fun x:any. x + 100)
  contexts:
    # The expression crashes in any context that needs it.
    - source: >-
        HOLE
      expected: "runtime failure"

- name: 02-rank2-poly-id
  program: >-
    (fun i . (fun a . i true) (i 5)) (fun x . x)
  oracle_migration: >-
    (fun i:any -> any. (fun a:any. i true) (i 5)) (fun x:any. x)
  contexts:
    # Direct observation catches a migration that changes the result tag or fails early.
    - source: >-
        HOLE
      expected: "true"
    # A boolean demand checks that the dynamically returned boolean remains usable as bool.
    - source: >-
        if ((HOLE : any)) then 11 else 12
      expected: "11"
    # An incompatible integer demand detects a migration that incorrectly permits the result as int.
    - source: >-
        ((HOLE : any)) + 1
      expected: "runtime failure"
    # An incompatible function demand detects a migration that changes the result into a callable value.
    - source: >-
        ((HOLE : any)) 0
      expected: "runtime failure"

- name: 03-unreachable-error
  program: >-
    (fun b . b (fun c . ((fun x . x x) 5) 5) (fun d . 0))
    (fun t . fun f . f)
  oracle_migration: >-
    (fun b:(any -> any) -> (any -> int) -> any -> int.
      b (fun c:any. (fun x:any. x x) 5 5) (fun d:any. 0))
    (fun t:any -> any. fun f:any -> int. f)
  contexts:
    # A boolean argument detects an unsafe narrowing of the returned function's domain.
    - source: >-
        ((HOLE : any)) true
      expected: "0"
    # An integer argument tests the same dynamic domain at a distinct ground tag.
    - source: >-
        ((HOLE : any)) 42
      expected: "0"
    # A function argument ensures higher-order values remain accepted across the boundary.
    - source: >-
        ((HOLE : any)) (fun q . q)
      expected: "0"
    # Consuming the result as int checks its codomain as well as its permissive domain.
    - source: >-
        (((HOLE : any)) false) + 1
      expected: "1"

- name: 04-f-in-f-out
  program: >-
    (fun f . (fun y . f) (f 5)) (fun x . 10 + x)
  oracle_migration: >-
    (fun f:int -> int. (fun y:int. f) (f 5)) (fun x:int. 10 + x)
  contexts:
    # A boundary integer probes the returned function's accepted domain and result.
    - source: >-
        ((HOLE : any)) 0
      expected: "10"
    # A second integer makes input-insensitive or hard-coded behavior less likely to pass.
    - source: >-
        ((HOLE : any)) 7
      expected: "17"
    # A boolean demand preserves the original cast failure for an incompatible argument.
    - source: >-
        ((HOLE : any)) true
      expected: "runtime failure"
    # Arithmetic consumption verifies that the successful result remains observably integer.
    - source: >-
        (((HOLE : any)) 5) * 2
      expected: "30"

- name: 05-order3-fun
  program: >-
    fun f . fun x . x (f x)
  oracle_migration: >-
    fun f:(any -> any) -> any. fun x:any -> any. x (f x)
  contexts:
    # The original TypeWhich witness exercises a higher-order identity flow ending in bool.
    - source: >-
        ((HOLE : any)) (fun a . a) (fun b . true)
      expected: "true"
    # An integer flow through both callbacks catches ground-type over-specialization.
    - source: >-
        ((HOLE : any)) (fun a . 0) (fun b . b + 1)
      expected: "1"
    # A boolean flow into a conditional distinguishes it from the integer instantiation.
    - source: >-
        ((HOLE : any)) (fun a . true) (fun b . if b then 8 else 9)
      expected: "8"

- name: 06-order3-intfun
  program: >-
    fun f . fun g . (f g) ((g 10) + 1)
  oracle_migration: >-
    fun f:(int -> int) -> int -> any.
    fun g:int -> int. (f g) ((g 10) + 1)
  contexts:
    # The original witness observes a boolean result while exercising the required integer flow.
    - source: >-
        ((HOLE : any)) (fun a . fun b . true) (fun c . 0)
      expected: "true"
    # An arithmetic callback checks that intermediate and final integer contracts are preserved.
    - source: >-
        ((HOLE : any)) (fun a . fun b . b * 2) (fun c . c + 1)
      expected: "24"
    # A higher-order result catches migrations that unnecessarily restrict the final codomain.
    - source: >-
        (((HOLE : any)) (fun a . fun b . fun q . b + q) (fun c . 3)) 4
      expected: "8"

- name: 07-double-f
  program: >-
    fun f . f (f true)
  oracle_migration: >-
    fun f:any. f (f true)
  contexts:
    # A function-valued intermediate tests higher-order reuse of the callback result.
    - source: >-
        (((HOLE : any)) (fun x . fun y . y)) 17
      expected: "17"
    # A boolean endomorphism checks repeated application at the initial ground type.
    - source: >-
        ((HOLE : any)) (fun x . if x then false else true)
      expected: "true"
    # A constant integer callback tests a different result tag on the second invocation.
    - source: >-
        (((HOLE : any)) (fun x . 3)) + 4
      expected: "7"
    # The original incompatible arithmetic flow must remain a cast failure.
    - source: >-
        ((HOLE : any)) (fun x . x + 1)
      expected: "runtime failure"

