- name: 09-precision-relation
  program: >-
    (fun f . f true + (fun g . g 5) f) (fun x . 5)
  oracle_migration: >-
    (fun f:any -> int. f true + (fun g:any -> int. g 5) f)
    (fun x:any. 5)
  maximal_migrations:
    - >-
      (fun f:any -> int. f true + (fun g:int -> int. g 5) f)
      (fun x:any. 5)

- name: 10-if-tag
  program: >-
    fun tag . fun x . if tag then x + 1 else if x then 1 else 0
  oracle_migration: >-
    fun tag:any. fun x:any.
    if tag then x + 1 else if x then 1 else 0
  context: >-
    (HOLE) true 1
  maximal_migrations:
    - >-
      fun tag:any. fun x:any.
      if tag then x + 1 else if x then 1 else 0

