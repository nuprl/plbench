- name: 09-precision-relation
  program: >-
    (fun f . f true + (fun g . g 5) f) (fun x . 5)
  oracle_migration: >-
    (fun f:any -> int. f true + (fun g:int -> int. g 5) f)
    (fun x:any. 5)
  contexts:
    # Direct observation detects changes to the successful closed computation.
    - source: >-
        HOLE
      expected: "10"
    # Arithmetic use confirms that the result remains available at int.
    - source: >-
        ((HOLE : any)) + 7
      expected: "17"
    # An incompatible boolean demand ensures the result's ground tag is not weakened.
    - source: >-
        if ((HOLE : any)) then 1 else 2
      expected: "runtime failure"

- name: 10-if-tag
  program: >-
    fun tag . fun x . if tag then x + 1 else if x then 1 else 0
  oracle_migration: >-
    fun tag:any. fun x:any.
    if tag then x + 1 else if x then 1 else 0
  contexts:
    # The arithmetic branch requires x at int when the tag selects it.
    - source: >-
        ((HOLE : any)) true 1
      expected: "2"
    # The alternate branch requires x at bool and observes its true case.
    - source: >-
        ((HOLE : any)) false true
      expected: "1"
    # The false boolean case prevents a constant alternate-branch result from passing.
    - source: >-
        ((HOLE : any)) false false
      expected: "0"
    # Selecting arithmetic with a boolean x preserves the original incompatible-use failure.
    - source: >-
        ((HOLE : any)) true true
      expected: "runtime failure"

- name: 11-apply-add
  program: >-
    fun x . x (x + 1)
  oracle_migration: >-
    fun x:any. x (x + 1)
  contexts:
    # An integer exposes the unavoidable conflict between arithmetic and function use.
    - source: >-
        ((HOLE : any)) 4
      expected: "runtime failure"
    # A boolean checks that failure is preserved for a distinct ground tag.
    - source: >-
        ((HOLE : any)) true
      expected: "runtime failure"
    # A function checks that failure is also preserved when arithmetic rejects a callable value.
    - source: >-
        ((HOLE : any)) (fun y . y)
      expected: "runtime failure"

- name: 12-add-applied
  program: >-
    fun x . x ((x true) + 1)
  oracle_migration: >-
    fun x:any -> int. x (x true + 1)
  contexts:
    # A constant callback supplies the polymorphic-looking uses while producing a stable int.
    - source: >-
        ((HOLE : any)) (fun y . 1)
      expected: "1"
    # A different constant and arithmetic observation detect hard-coded successful results.
    - source: >-
        ((HOLE : any)) (fun y . 5) + 2
      expected: "7"
    # Identity exposes the incompatible transition from bool to arithmetic.
    - source: >-
        ((HOLE : any)) (fun y . y)
      expected: "runtime failure"
    # A precisely typed callback checks preservation of failure at the higher-order boundary.
    - source: >-
        ((HOLE : any)) (fun y : int . 3)
      expected: "runtime failure"

- name: 13-add-two-applies
  program: >-
    fun x . x 4 + x true
  oracle_migration: >-
    fun x:any -> int. x 4 + x true
  contexts:
    # A constant callback witnesses successful use at both argument tags.
    - source: >-
        ((HOLE : any)) (fun y . 1)
      expected: "2"
    # A distinct result with arithmetic observation detects constant-answer shortcuts.
    - source: >-
        ((HOLE : any)) (fun y . 6) * 3
      expected: "36"
    # An int-only callback must fail when the second call supplies bool.
    - source: >-
        ((HOLE : any)) (fun y : int . 2)
      expected: "runtime failure"
    # A bool-only callback must fail when the first call supplies int.
    - source: >-
        ((HOLE : any)) (fun y : bool . 3)
      expected: "runtime failure"

