# The expression crashes in any context that needs it, so that's the only
# test we need.
- name: 01-farg-mismatch
  program: >-
    (fun f . f true) (fun x . x + 100)
  oracle_migration: >-
    (fun f:bool -> int. f true) (fun x:any. x + 100)
  contexts:

    - source: >-
        HOLE
      expected: "runtime failure"

# i is bound to the identity function and used polymorphically. The tag of the
# program is bool.
- name: 02-rank2-poly-id
  program: >-
    (fun i . (fun a . i true) (i 5)) (fun x . x)
  oracle_migration: >-
    (fun i:any -> any. (fun a:any. i true) (i 5)) (fun x:any. x)
  contexts:
    # Direct observation catches a migration that changes the result tag or fails early.
    - source: >-
        HOLE
      expected: "true"
    # Demand the expression as a bool. This rejects `i : any -> int` and similar
    # migrations. There's no need to check for runtime errors because this check
    # alone ensures that the tag for the migrated program is bool.
    - source: >-
        if ((HOLE : any)) then 11 else 12
      expected: "11"

# (fun t . fun f . f) is a lambda-calculus false, and (fun b ...) is an if.
# The true branch would raise a runtime error, but it is not reachable.
- name: 03-unreachable-error
  program: >-
    (fun b . b (fun c . ((fun x . x x) 5) 5) (fun d . 0))
    (fun t . fun f . f)
  oracle_migration: >-
    (fun b:(any -> any) -> (any -> int) -> any -> int.
      b (fun c:any. (fun x:any. x x) 5 5) (fun d:any. 0))
    (fun t:any -> any. fun f:any -> int. f)
  contexts:
    # A boolean argument detects an unsafe narrowing of the returned function's domain.
    - source: >-
        ((HOLE : any)) true
      expected: "0"
    # An integer argument tests the same dynamic domain at a distinct ground tag.
    - source: >-
        ((HOLE : any)) 42
      expected: "0"
    # A function argument ensures higher-order values remain accepted across the boundary.
    - source: >-
        ((HOLE : any)) (fun q . q)
      expected: "0"
    # Consuming the result as int checks its codomain as well as its permissive domain.
    - source: >-
        (((HOLE : any)) false) + 1
      expected: "1"

- name: 04-f-in-f-out
  program: >-
    (fun f . (fun y . f) (f 5)) (fun x . 10 + x)
  oracle_migration: >-
    (fun f:int -> int. (fun y:int. f) (f 5)) (fun x:int. 10 + x)
  contexts:
    # Asserts that the result is tagged as a function that accepts an int and
    # returns an int. This rejects migrations such as `f : any -> bool` that
    # would make the result of the function not an int or `y:bool` that would
    # make the function crash on application.
    - source: >-
        ((HOLE) 0) + 1
      expected: "11"

- name: 05-order3-fun
  program: >-
    fun f . fun x . x (f x)
  # The domain of f must be `any -> any` because f receives x, and x must
  # remain applicable to arguments and produce results with different runtime
  # tags in different compatible contexts.
  oracle_migration: >-
    fun f:(any -> any) -> any. fun x:any -> any. x (f x)
  contexts:
    # The original TypeWhich witness exercises a higher-order identity flow ending in bool.
    - source: >-
        ((HOLE : any)) (fun a . a) (fun b . true)
      expected: "true"
    # An integer flow through both callbacks catches ground-type over-specialization.
    - source: >-
        ((HOLE : any)) (fun a . 0) (fun b . b + 1)
      expected: "1"
    # A boolean flow into a conditional distinguishes it from the integer instantiation.
    - source: >-
        ((HOLE : any)) (fun a . true) (fun b . if b then 8 else 9)
      expected: "8"

- name: 06-order3-intfun
  program: >-
    fun f . fun g . (f g) ((g 10) + 1)
  oracle_migration: >-
    fun f:(int -> int) -> int -> any.
    fun g:int -> int. (f g) ((g 10) + 1)
  contexts:
    # The original witness observes a boolean result while exercising the required integer flow.
    - source: >-
        ((HOLE : any)) (fun a . fun b . true) (fun c . 0)
      expected: "true"
    # An arithmetic callback checks that intermediate and final integer contracts are preserved.
    - source: >-
        ((HOLE : any)) (fun a . fun b . b * 2) (fun c . c + 1)
      expected: "24"
    # A higher-order result catches migrations that unnecessarily restrict the final codomain.
    - source: >-
        (((HOLE : any)) (fun a . fun b . fun q . b + q) (fun c . 3)) 4
      expected: "8"

- name: 07-double-f
  program: >-
    fun f . f (f true)
  # f is always applied, so it can be given a function type. Both its domain
  # and codomain must remain any: the second call consumes the first call's
  # result, which may have any runtime tag.
  oracle_migration: >-
    fun f:any -> any. f (f true)
  contexts:
    # f always returns the identity function, exercising a function-valued intermediate.
    - source: >-
        (((HOLE : any)) (fun x . fun y . y)) 17
      expected: "17"
    # A boolean endomorphism exercises a bool result.
    - source: >-
        ((HOLE : any)) (fun x . if x then false else true)
      expected: "true"
    # A constant callback exercises an int result.
    - source: >-
        (((HOLE : any)) (fun x . 3)) + 4
      expected: "7"

# This program will always crash in any context that needs it.
- name: 08-outflows
  program: >-
    (fun x . x 5 + x) 5
  oracle_migration: >-
    (fun x:any. x 5 + x) 5
  contexts:
    # The closed failure detects any annotation that changes the unavoidable bad outflow.
    - source: >-
        HOLE
      expected: "runtime failure"

- name: 09-precision-relation
  # (fun x . 5) is bound to f. We do f true. We also do g 5, where g = f. So,
  # x : any.
  program: >-
    (fun f . f true + (fun g . g 5) f) (fun x . 5)
  oracle_migration: >-
    (fun f:any -> int. f true + (fun g:int -> int. g 5) f)
    (fun x:any. 5)
  contexts:
    # The exact result establishes both the successful computation and its int tag.
    - source: >-
        HOLE
      expected: "10"

- name: 10-if-tag
  program: >-
    fun tag . fun x . if tag then x + 1 else if x then 1 else 0
  # tag is consumed only as bool. x must remain any because one branch consumes
  # it as int and the other as bool.
  oracle_migration: >-
    fun tag:bool. fun x:any.
    if tag then x + 1 else if x then 1 else 0
  contexts:
    # The arithmetic branch requires x at int when the tag selects it.
    - source: >-
        ((HOLE : any)) true 1
      expected: "2"
    # The alternate branch requires x at bool and observes its true case.
    - source: >-
        ((HOLE : any)) false true
      expected: "1"

- name: 11-apply-add
  program: >-
    fun x . x (x + 1)
  # x is consumed both as an int by addition and as a function by application.
  # Those types are incompatible, so only any permits both uses.
  oracle_migration: >-
    fun x:any. x (x + 1)
  contexts:
    # Any argument reaches the unavoidable conflict between arithmetic and function use.
    - source: >-
        ((HOLE : any)) 4
      expected: "runtime failure"

- name: 12-add-applied
  program: >-
    fun x . x ((x true) + 1)
  # x is always applied and both results are consumed as ints. Its domain must
  # remain any because the first call receives bool and the second receives int.
  oracle_migration: >-
    fun x:any -> int. x (x true + 1)
  contexts:
    # A constant callback supplies the polymorphic-looking uses while producing a stable int.
    - source: >-
        ((HOLE : any)) (fun y . 1)
      expected: "1"
    # Identity exposes the incompatible transition from bool to arithmetic.
    - source: >-
        ((HOLE : any)) (fun y . y)
      expected: "runtime failure"

- name: 13-add-two-applies
  program: >-
    fun x . x 4 + x true
  # x must accept both int and bool, so its domain is any. Both call results are
  # added, which makes its codomain int.
  oracle_migration: >-
    fun x:any -> int. x 4 + x true
  contexts:
    # A constant callback witnesses successful use at both argument tags.
    - source: >-
        ((HOLE : any)) (fun y . 1)
      expected: "2"
    # An int-only callback must fail when the second call supplies bool.
    - source: >-
        ((HOLE : any)) (fun y : int . 2)
      expected: "runtime failure"
    # A bool-only callback must fail when the first call supplies int.
    - source: >-
        ((HOLE : any)) (fun y : bool . 3)
      expected: "runtime failure"

- name: 14-identity-four
  program: >-
    (fun x . x) 4
  # The identity is called only with 4, so its parameter and result can both be int.
  oracle_migration: >-
    (fun x:int. x) 4
  contexts:
    # The exact result establishes both the identity computation and its int tag.
    - source: >-
        HOLE
      expected: "4"

- name: 15-succ-id-id
  program: >-
    1 + ((fun y . y) ((fun x . x) true))
  # x receives and returns bool. y also receives that bool, but its result is
  # consumed as int; leaving y at any preserves the original failing cast.
  oracle_migration: >-
    1 + (fun y:any. y) ((fun x:bool. x) true)
  contexts:
    # The unavoidable cast failure detects migrations that mask the bad flow.
    - source: >-
        HOLE
      expected: "runtime failure"

- name: 16-identity
  program: >-
    fun x . x
  # Compatible callers may instantiate the identity at any ground or function
  # type, so neither its parameter nor its result can be narrowed from any.
  oracle_migration: >-
    fun x:any. x
  contexts:
    # An integer call rejects unsafe specialization of the identity's domain or codomain.
    - source: >-
        ((HOLE : any)) 7
      expected: "7"
    # A boolean call tests the same polymorphic behavior at another ground tag.
    - source: >-
        ((HOLE : any)) true
      expected: "true"
    # A function value followed by integer use exercises higher-order identity behavior.
    - source: >-
        (((HOLE : any)) (fun z . z)) 9
      expected: "9"

- name: 17-apply2
  program: >-
    fun x . fun y . y x x
  # x may have any runtime tag. y consumes x in both argument positions and may
  # return any result, giving it type any -> any -> any.
  oracle_migration: >-
    fun x:any. fun y:any -> any -> any. y x x
  contexts:
    # Integer duplication tests both argument positions and an integer-producing consumer.
    - source: >-
        ((HOLE : any)) 1 (fun a . fun b . a + b)
      expected: "2"
    # Boolean duplication detects specialization to the integer instantiation.
    - source: >-
        ((HOLE : any)) true (fun a . fun b . if a then b else false)
      expected: "true"
    # A function-valued x probes higher-order duplication and subsequent application.
    - source: >-
        (((HOLE : any)) (fun z . z) (fun a . fun b . a)) 6
      expected: "6"

- name: 18-indirect-apply-self
  program: >-
    fun x . (fun y . x) x x
  # The final application uses x as a function receiving x itself. The
  # non-recursive approximation any -> any preserves every possible result;
  # y receives the same function value and therefore has that type as well.
  oracle_migration: >-
    fun x:any -> any. (fun y:any -> any. x) x x
  contexts:
    # A constant integer function checks a successful callable with a ground result.
    - source: >-
        ((HOLE : any)) (fun z . 3)
      expected: "3"
    # A constant boolean function distinguishes ground codomain specialization.
    - source: >-
        ((HOLE : any)) (fun z . true)
      expected: "true"
    # A function-producing callback checks that the result may remain higher order.
    - source: >-
        (((HOLE : any)) (fun z . fun w . w)) false
      expected: "false"

- name: 19-the-long-one
  program: >-
    fun x . (fun f . (fun xx . fun y . xx) f (f x)) (fun z . 1)
  # f ignores an arbitrary argument and returns int, so f and xx have type
  # any -> int. x remains any because it is passed to f, and y is int because it
  # receives f x. The whole inner expression returns xx.
  oracle_migration: >-
    fun x:any.
    (fun f:any -> int. (fun xx:any -> int. fun y:int. xx) f (f x))
    (fun z:any. 1)
  contexts:
    # Boolean input with integer consumption exercises the original witness path.
    - source: >-
        ((HOLE : any)) true 1
      expected: "1"
    # An integer input paired with bool checks that neither exposed argument is over-specialized.
    - source: >-
        ((HOLE : any)) 4 false
      expected: "1"
    # Higher-order values at both exposed positions test preservation beyond ground tags.
    - source: >-
        ((HOLE : any)) (fun q . q) (fun r . r)
      expected: "1"

- name: 20-apply-self
  program: >-
    fun x . x x
  # x must be callable and must accept its own function value. any -> any is the
  # most precise finite type that admits the self-application and arbitrary results.
  oracle_migration: >-
    fun x:any -> any. x x
  contexts:
    # A constant integer callback checks a successful ground codomain.
    - source: >-
        ((HOLE : any)) (fun z . 5)
      expected: "5"
    # A constant boolean callback detects codomain specialization to int.
    - source: >-
        ((HOLE : any)) (fun z . true)
      expected: "true"
    # A function-producing callback tests a higher-order result after self-application.
    - source: >-
        (((HOLE : any)) (fun z . fun w . w)) false
      expected: "false"

- name: 21-untypable-in-sys-f
  program: >-
    (fun x . fun y . y (x (fun x . x)) (x (fun b . fun c . b)))
    (fun d . d d)
  # x receives two different function shapes, represented together as
  # any -> any, and may return either ground or function values. y consumes two
  # such arbitrary results. The self-applied d likewise requires any -> any.
  # Upstream's manual assertion diverges in the first context below; this is the
  # most precise upstream TypeWhich result that passes all documented contexts.
  oracle_migration: >-
    (fun x:(any -> any) -> any.
      fun y:any -> any -> any.
      y (x (fun x:any. x)) (x (fun b:any. fun c:any. b)))
    (fun d:any -> any. d d)
  contexts:
    # An integer-selecting consumer tests the first computed value at a ground codomain.
    - source: >-
        ((HOLE : any)) (fun a . fun b . a) 7
      expected: "7"
    # Changing only that selected ground tag detects integer specialization.
    - source: >-
        ((HOLE : any)) (fun a . fun b . a) true
      expected: "true"
    # Selecting the other computed value and applying it exercises its higher-order shape.
    - source: >-
        ((HOLE : any)) (fun a . fun b . b) true false 9
      expected: "false"
    # Higher-order consumption of the selected value checks function-level precision boundaries.
    - source: >-
        (((HOLE : any)) (fun a . fun b . a)) (fun q . q)
      expected: "<function>"
