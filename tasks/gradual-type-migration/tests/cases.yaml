- name: 21-untypable-in-sys-f
  program: >-
    (fun x . fun y . y (x (fun x . x)) (x (fun b . fun c . b)))
    (fun d . d d)
  oracle_migration: >-
    (fun x:(any -> any) -> any. fun y:any.
      y (x (fun x:any. x)) (x (fun b:any. fun c:any. b)))
    (fun d:any -> any. d d)
  maximal_migrations:
    - >-
      (fun x:(any -> any -> any) -> any.
        fun y:any -> any -> any.
          y (x (fun x:any. x)) (x (fun b:any. fun c:any. b)))
      (fun d:any -> any. d d)

- name: 22-self-interpreter
  program: >-
    (fun h . (fun x . h (x x)) (fun x . h x x))
    (fun e . fun m . m (fun x . x)
      (fun m . fun n . (e m) (e n))
      (fun m . fun v . e (m v)))
  oracle_migration: >-
    (fun h:any -> any -> any.
      (fun x:any -> any. h (x x)) (fun x:any. h x x))
    (fun e:any. fun m:any.
      m (fun x:any. x)
        (fun m:any. fun n:any. e m (e n))
        (fun m:any. fun v:any. e (m v)))
  maximal_migrations:
    - >-
      (fun h:((any -> any) -> (any -> any -> any) ->
              ((any -> any) -> any -> any) -> any) ->
             ((any -> any) -> (any -> any -> any) ->
              ((any -> any) -> any -> any) -> any) -> any.
        (fun x:any -> any. h (x x))
        (fun x:(any -> any) -> (any -> any -> any) ->
               ((any -> any) -> any -> any) -> any. h x x))
      (fun e:any.
        fun m:(any -> any) -> (any -> any -> any) ->
              ((any -> any) -> any -> any) -> any.
          m (fun x:any. x)
            (fun m:any. fun n:any. e m (e n))
            (fun m:any -> any. fun v:any. e (m v)))
