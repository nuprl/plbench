- name: 01-farg-mismatch
  program: >-
    (fun f . f true) (fun x . x + 100)
  oracle_migration: >-
    (fun f:bool -> int. f true) (fun x:bool. (x : any) + 100)
  maximal_migrations:
    - >-
      (fun f:bool -> int. f true) (fun x:bool. (x : any) + 100)

- name: 02-rank2-poly-id
  program: >-
    (fun i . (fun a . i true) (i 5)) (fun x . x)
  oracle_migration: >-
    (fun i:any -> any. (fun a:any. i true) (i 5)) (fun x:any. x)
  maximal_migrations:
    - >-
      (fun i:any -> any. (fun a:any. i true) (i 5)) (fun x:any. x)

- name: 03-unreachable-error
  program: >-
    (fun b . b (fun c . ((fun x . x x) 5) 5) (fun d . 0))
    (fun t . fun f . f)
  oracle_migration: >-
    (fun b:(any -> any) -> (any -> int) -> any -> int.
      b (fun c:any. (fun x:any. x x) 5 5) (fun d:any. 0))
    (fun t:any -> any. fun f:any -> int. f)
  maximal_migrations:
    - >-
      (fun b:(any -> any) -> (any -> int) -> any -> int.
        b (fun c:any. (fun x:int. x x) 5 5) (fun d:any. 0))
      (fun t:any -> any. fun f:any -> int. f)

- name: 04-f-in-f-out
  program: >-
    (fun f . (fun y . f) (f 5)) (fun x . 10 + x)
  oracle_migration: >-
    (fun f:any -> int. (fun y:int. f) (f 5)) (fun x:any. 10 + x)
  maximal_migrations:
    - >-
      (fun f:int -> int. (fun y:int. f) (f 5)) (fun x:int. 10 + x)

- name: 05-order3-fun
  program: >-
    fun f . fun x . x (f x)
  oracle_migration: >-
    fun f:any. fun x:any. x (f x)
  context: >-
    (HOLE) (fun a . a) (fun b . true)
  maximal_migrations:
    - >-
      fun f:(any -> any) -> any. fun x:any -> any. x (f x)

- name: 06-order3-intfun
  program: >-
    fun f . fun g . (f g) ((g 10) + 1)
  oracle_migration: >-
    fun f:any. fun g:any. (f g) ((g 10) + 1)
  context: >-
    (HOLE) (fun a . fun b . true) (fun c . 0)
  maximal_migrations:
    - >-
      fun f:(int -> int) -> int -> any.
      fun g:int -> int. (f g) ((g 10) + 1)

- name: 07-double-f
