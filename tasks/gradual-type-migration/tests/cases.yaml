- name: 21-untypable-in-sys-f
  program: >-
    (fun x . fun y . y (x (fun x . x)) (x (fun b . fun c . b)))
    (fun d . d d)
  # Upstream's manual assertion diverges in the first context below. This is the
  # most precise upstream TypeWhich result that passes all documented contexts.
  oracle_migration: >-
    (fun x:(any -> any) -> any.
      fun y:any -> any -> any.
      y (x (fun x:any. x)) (x (fun b:any. fun c:any. b)))
    (fun d:any -> any. d d)
  contexts:
    # An integer-selecting consumer tests the first computed value at a ground codomain.
    - source: >-
        ((HOLE : any)) (fun a . fun b . a) 7
      expected: "7"
    # Changing only that selected ground tag detects integer specialization.
    - source: >-
        ((HOLE : any)) (fun a . fun b . a) true
      expected: "true"
    # Selecting the other computed value and applying it exercises its higher-order shape.
    - source: >-
        ((HOLE : any)) (fun a . fun b . b) true false 9
      expected: "false"
    # Higher-order consumption of the selected value checks function-level precision boundaries.
    - source: >-
        (((HOLE : any)) (fun a . fun b . a)) (fun q . q)
      expected: "<function>"

- name: 22-self-interpreter
  program: >-
    (fun h . (fun x . h (x x)) (fun x . h x x))
    (fun e . fun m . m (fun x . x)
      (fun m . fun n . (e m) (e n))
      (fun m . fun v . e (m v)))
  # Upstream's manual assertion diverges in the application context below. This
  # upstream TypeWhich result preserves all three interpreter branches.
  oracle_migration: >-
    (fun h:any -> any -> any.
      (fun x:any -> any. h (x x)) (fun x:any. h x x))
    (fun e:any. fun m:any.
      m (fun x:any. x)
        (fun m:any. fun n:any. e m (e n))
        (fun m:any. fun v:any. e (m v)))
  contexts:
    # A variable-form encoding checks the interpreter's base dispatch without deeper recursion.
    - source: >-
        ((HOLE : any)) (fun var . fun app . fun lam . var 5)
      expected: "5"
    # An application-form encoding exercises recursive interpretation of two terminating children.
    - source: >-
        ((HOLE : any)) (fun var . fun app . fun lam .
          app (fun v1 . fun a1 . fun l1 . v1 (fun q . q))
              (fun a2 . fun b2 . fun c2 . a2 6))
      expected: "6"
    # A lambda-form encoding tests environment extension and application of the interpreted closure.
    - source: >-
        ((HOLE : any)) (fun var . fun app . fun lam .
          lam (fun v . fun a . fun b . fun c . a v) 9)
      expected: "9"
