# Dataset manifest for nuprl/plbench
# Local Harbor dataset of ILVM programming-language tasks.

[dataset]
name = "nuprl/plbench"
description = "Programming-language implementation and type-system tasks"
authors = []
keywords = ["programming-languages", "ilvm", "typewhich", "scheme"]

tasks = [
  { path = "tasks/ilvm-interpreter" },
  { path = "tasks/ilvm-self-hosting-compiler" },
  { path = "tasks/typewhich" },
  { path = "tasks/gradual-type-migration" },
  { path = "tasks/scheme-typeinf" },
  { path = "tasks/scheme-tail-call-compiler" },
]
